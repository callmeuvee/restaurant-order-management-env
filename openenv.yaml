environment:
  name: restaurant-order-management-env
  type: rl
  version: "1.0"
  description: Production-ready restaurant kitchen management environment

observation_space:
  type: box
  shape: [5]

action_space:
  type: discrete
  n: 40

tasks:
  - name: easy
    description: Easy difficulty with 10 orders
  - name: medium
    description: Medium difficulty with 20 orders
  - name: hard
    description: Hard difficulty with 40 orders

training:
  episodes: 100
  max_steps_per_episode: 100
  learning_rate: 0.001

logging:
  save_path: ./results
  log_interval: 10
